# Gitleaks configuration — extends the default ruleset.
#
# Allowlist entries must be PRECISE (match the placeholder, not the file):
# a real key pasted into these files would still be caught by other rules.

[extend]
useDefault = true

[allowlist]
description = "Documented placeholders and generated build artifacts"
regexes = [
  # LM Studio's well-known dummy bearer token used in curl examples
  # (.env.example, docs/local-inference.md). Matches the captured secret
  # exactly — nothing else is exempted. Not a secret.
  '''^lm-studio$''',
]
paths = [
  # Next.js build output accidentally committed on old (unmerged) branches.
  # prerender-manifest.json contains per-build auto-generated preview-mode
  # tokens — machine-generated, not credentials for any external system.
  '''(^|/)\.next/''',
]
