---
# System updates with safe, serialized rollout: one host at a time, reboot
# only when the kernel requires it, verify the app afterwards.
- name: Update systems
  hosts: all
  become: true
  serial: 1 # never take the whole fleet down at once

  tasks:
    - name: Upgrade packages
      ansible.builtin.apt:
        upgrade: safe
        update_cache: true
        autoremove: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_required.stat.exists

    - name: Wait for Docker after reboot
      ansible.builtin.service:
        name: docker
        state: started
      when: reboot_required.stat.exists

- name: Re-verify application health after updates
  ansible.builtin.import_playbook: verify.yml
