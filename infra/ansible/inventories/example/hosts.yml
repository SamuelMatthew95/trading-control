# Example inventory — copy to inventories/<env>/hosts.yml and edit.
#
#   ansible-playbook -i inventories/example/hosts.yml playbooks/site.yml
#
# Local smoke test (runs everything against this machine):
#   ansible-playbook -i 'localhost,' -c local playbooks/verify.yml
all:
  vars:
    ansible_user: ops
    project_root: /opt/trading-control
    repo_url: https://github.com/SamuelMatthew95/trading-control.git
    repo_version: main
    api_health_url: http://localhost:8000/health

  children:
    docker_hosts:
      hosts:
        trading-vm-1:
          ansible_host: 192.0.2.10

    k8s_hosts:
      hosts:
        kind-vm-1:
          ansible_host: 192.0.2.20

    monitoring_hosts:
      hosts:
        observability-vm-1:
          ansible_host: 192.0.2.30
