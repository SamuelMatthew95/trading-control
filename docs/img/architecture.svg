<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 456" width="800" height="456">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3d444d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="456" fill="#0d1117" rx="10"/>

  <!-- Header label -->
  <text x="400" y="30" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#656d76" letter-spacing="2.5">
    SYSTEM ARCHITECTURE
  </text>

  <!-- ─── LAYER 1: PostgreSQL ───────────────────────────────────────────── -->
  <rect x="40" y="44" width="720" height="72" rx="8"
    fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <!-- Color chip -->
  <rect x="40" y="44" width="6" height="72" rx="3" fill="#1f6feb"/>
  <!-- Label chip -->
  <rect x="58" y="62" width="34" height="34" rx="6" fill="#0c2d4e"/>
  <text x="75" y="84" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="700" fill="#58a6ff">PG</text>
  <!-- Title -->
  <text x="106" y="71"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">PostgreSQL 15+</text>
  <!-- Description -->
  <text x="106" y="92"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#848d97">
    Source of truth  ·  pgvector enabled  ·  schema v3  ·  all writes through SafeWriter
  </text>
  <!-- Right tag -->
  <text x="736" y="84" text-anchor="end"
    font-family="ui-monospace,'SF Mono',Consolas,monospace"
    font-size="11" fill="#388bfd">Render PostgreSQL</text>

  <!-- ─── ARROW 1 ───────────────────────────────────────────────────────── -->
  <line x1="400" y1="116" x2="400" y2="146"
    stroke="#3d444d" stroke-width="2" marker-end="url(#a)"/>
  <text x="412" y="135"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#656d76">guaranteed delivery  ·  idempotency_key</text>

  <!-- ─── LAYER 2: Redis Streams ────────────────────────────────────────── -->
  <rect x="40" y="148" width="720" height="72" rx="8"
    fill="#161b22" stroke="#da3633" stroke-width="2"/>
  <rect x="40" y="148" width="6" height="72" rx="3" fill="#da3633"/>
  <rect x="58" y="166" width="34" height="34" rx="6" fill="#2e0d0d"/>
  <text x="75" y="188" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="700" fill="#f85149">RS</text>
  <text x="106" y="175"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">Redis Streams</text>
  <text x="106" y="196"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#848d97">
    Event delivery and fan-out  ·  market_ticks · signals · decisions · graded_decisions
  </text>
  <text x="736" y="188" text-anchor="end"
    font-family="ui-monospace,'SF Mono',Consolas,monospace"
    font-size="11" fill="#f85149">Render Redis</text>

  <!-- ─── ARROW 2 ───────────────────────────────────────────────────────── -->
  <line x1="400" y1="220" x2="400" y2="250"
    stroke="#3d444d" stroke-width="2" marker-end="url(#a)"/>
  <text x="412" y="239"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#656d76">consumer groups  ·  trace_id propagated on every event</text>

  <!-- ─── LAYER 3: AI Agents ───────────────────────────────────────────── -->
  <rect x="40" y="252" width="720" height="72" rx="8"
    fill="#161b22" stroke="#2ea043" stroke-width="2"/>
  <rect x="40" y="252" width="6" height="72" rx="3" fill="#2ea043"/>
  <rect x="58" y="270" width="34" height="34" rx="6" fill="#0a1e12"/>
  <text x="75" y="292" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="700" fill="#3fb950">AI</text>
  <text x="106" y="279"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">AI Agent Pipeline</text>
  <text x="106" y="300"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#848d97">
    7 specialized agents  ·  event-driven  ·  never modify source truth directly
  </text>
  <text x="736" y="292" text-anchor="end"
    font-family="ui-monospace,'SF Mono',Consolas,monospace"
    font-size="11" fill="#3fb950">Groq LLM</text>

  <!-- ─── ARROW 3 ───────────────────────────────────────────────────────── -->
  <line x1="400" y1="324" x2="400" y2="354"
    stroke="#3d444d" stroke-width="2" marker-end="url(#a)"/>
  <text x="412" y="343"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#656d76">WebSocket  ·  Server-Sent Events  ·  real-time push</text>

  <!-- ─── LAYER 4: Dashboard ───────────────────────────────────────────── -->
  <rect x="40" y="356" width="720" height="72" rx="8"
    fill="#161b22" stroke="#8957e5" stroke-width="2"/>
  <rect x="40" y="356" width="6" height="72" rx="3" fill="#8957e5"/>
  <rect x="58" y="374" width="34" height="34" rx="6" fill="#1c0d3a"/>
  <text x="75" y="396" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="700" fill="#a371f7">UI</text>
  <text x="106" y="383"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">Next.js 14 Dashboard</text>
  <text x="106" y="404"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#848d97">
    Live operator view  ·  agent status · pipeline health · stream metrics · trade feed
  </text>
  <text x="736" y="396" text-anchor="end"
    font-family="ui-monospace,'SF Mono',Consolas,monospace"
    font-size="11" fill="#a371f7">Vercel</text>

  <!-- ─── Footer ───────────────────────────────────────────────────────── -->
  <line x1="40" y1="444" x2="760" y2="444" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="453" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#3d444d">
    Determinism  ·  Idempotency  ·  Traceability  ·  Replayability
  </text>
</svg>
