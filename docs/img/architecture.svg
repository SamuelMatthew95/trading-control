<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 476" width="860" height="476">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <linearGradient id="pg-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c2d4e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="rd-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2e0d0d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="ag-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1e12"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="db-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c0d3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="860" height="476" fill="#0d1117" rx="12"/>
  <rect x="0" y="0" width="860" height="3" rx="1" fill="#1f6feb"/>

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <text x="430" y="34" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" font-weight="600" fill="#6e7681" letter-spacing="3">
    SYSTEM  ARCHITECTURE
  </text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 1 — PostgreSQL                                               -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="52" width="780" height="72" rx="9" fill="url(#pg-grad)" stroke="#1f6feb" stroke-width="1.5"/>
  <!-- Left accent -->
  <rect x="40" y="52" width="5" height="72" rx="2.5" fill="#1f6feb"/>

  <!-- DB cylinder icon (left) -->
  <ellipse cx="90" cy="70" rx="18" ry="6" fill="none" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="72" y="70" width="36" height="22" fill="none" stroke="#388bfd" stroke-width="1.5"/>
  <ellipse cx="90" cy="92" rx="18" ry="6" fill="none" stroke="#388bfd" stroke-width="1.5"/>
  <line x1="72" y1="78" x2="72" y2="70" stroke="#388bfd" stroke-width="1.5"/>
  <line x1="108" y1="78" x2="108" y2="70" stroke="#388bfd" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="130" y="78"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">PostgreSQL 15+</text>
  <text x="130" y="97"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" fill="#8b949e">
    Source of truth — pgvector enabled — schema v3 — SafeWriter enforced
  </text>

  <!-- Right badges -->
  <rect x="638" y="66" width="80" height="20" rx="4" fill="#0c2d4e" stroke="#1f6feb" stroke-width="1"/>
  <text x="678" y="80"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#58a6ff" text-anchor="middle">schema v3</text>
  <rect x="728" y="66" width="82" height="20" rx="4" fill="#0c2d4e" stroke="#1f6feb" stroke-width="1"/>
  <text x="769" y="80"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#58a6ff" text-anchor="middle">pgvector</text>

  <!-- ── Arrow 1 ──────────────────────────────────────────────────────── -->
  <line x1="430" y1="124" x2="430" y2="154" stroke="#21262d" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="344" y="130" width="172" height="16" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="430" y="142"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9" fill="#6e7681" text-anchor="middle">
    guaranteed delivery  ·  exactly-once via idempotency_key
  </text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 2 — Redis Streams                                            -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="156" width="780" height="72" rx="9" fill="url(#rd-grad)" stroke="#da3633" stroke-width="1.5"/>
  <rect x="40" y="156" width="5" height="72" rx="2.5" fill="#da3633"/>

  <!-- Stream icon (stacked lines) -->
  <rect x="72" y="165" width="36" height="5" rx="2" fill="#f85149" opacity="0.8"/>
  <rect x="72" y="175" width="36" height="5" rx="2" fill="#f85149" opacity="0.6"/>
  <rect x="72" y="185" width="36" height="5" rx="2" fill="#f85149" opacity="0.4"/>
  <rect x="72" y="195" width="36" height="5" rx="2" fill="#f85149" opacity="0.2"/>
  <rect x="72" y="205" width="36" height="5" rx="2" fill="#f85149" opacity="0.1"/>

  <text x="130" y="184"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">Redis Streams</text>
  <text x="130" y="203"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" fill="#8b949e">
    Event delivery and fan-out — market_ticks · signals · decisions · graded_decisions
  </text>

  <!-- Right badges -->
  <rect x="638" y="170" width="80" height="20" rx="4" fill="#2e0d0d" stroke="#da3633" stroke-width="1"/>
  <text x="678" y="184"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#f85149" text-anchor="middle">5 streams</text>
  <rect x="728" y="170" width="82" height="20" rx="4" fill="#2e0d0d" stroke="#da3633" stroke-width="1"/>
  <text x="769" y="184"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#f85149" text-anchor="middle">XREAD loop</text>

  <!-- ── Arrow 2 ──────────────────────────────────────────────────────── -->
  <line x1="430" y1="228" x2="430" y2="258" stroke="#21262d" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="352" y="234" width="156" height="16" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="430" y="246"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9" fill="#6e7681" text-anchor="middle">
    consumer groups  ·  trace_id propagated
  </text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 3 — AI Agents                                                -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="260" width="780" height="72" rx="9" fill="url(#ag-grad)" stroke="#2ea043" stroke-width="1.5"/>
  <rect x="40" y="260" width="5" height="72" rx="2.5" fill="#2ea043"/>

  <!-- Agent icon (network nodes) -->
  <circle cx="90" cy="296" r="7" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="73" cy="281" r="5" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <circle cx="107" cy="281" r="5" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <circle cx="73" cy="311" r="5" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <circle cx="107" cy="311" r="5" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="83" y1="290" x2="78" y2="285" stroke="#3fb950" stroke-width="1"/>
  <line x1="97" y1="290" x2="102" y2="285" stroke="#3fb950" stroke-width="1"/>
  <line x1="83" y1="302" x2="78" y2="307" stroke="#3fb950" stroke-width="1"/>
  <line x1="97" y1="302" x2="102" y2="307" stroke="#3fb950" stroke-width="1"/>

  <text x="130" y="288"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">AI Agent Pipeline</text>
  <text x="130" y="307"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" fill="#8b949e">
    7 specialized agents — event-driven — never modify source truth directly
  </text>

  <!-- Right badges -->
  <rect x="638" y="274" width="80" height="20" rx="4" fill="#0a1e12" stroke="#2ea043" stroke-width="1"/>
  <text x="678" y="288"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#3fb950" text-anchor="middle">7 agents</text>
  <rect x="728" y="274" width="82" height="20" rx="4" fill="#0a1e12" stroke="#2ea043" stroke-width="1"/>
  <text x="769" y="288"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#3fb950" text-anchor="middle">Groq LLM</text>

  <!-- ── Arrow 3 ──────────────────────────────────────────────────────── -->
  <line x1="430" y1="332" x2="430" y2="362" stroke="#21262d" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="344" y="338" width="172" height="16" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="430" y="350"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9" fill="#6e7681" text-anchor="middle">
    WebSocket  ·  Server-Sent Events  ·  real-time push
  </text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 4 — Next.js Dashboard                                        -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="364" width="780" height="72" rx="9" fill="url(#db-grad)" stroke="#8957e5" stroke-width="1.5"/>
  <rect x="40" y="364" width="5" height="72" rx="2.5" fill="#8957e5"/>

  <!-- Browser icon -->
  <rect x="72" y="370" width="36" height="28" rx="3" fill="none" stroke="#a371f7" stroke-width="1.5"/>
  <rect x="72" y="370" width="36" height="7" rx="3" fill="#a371f7" opacity="0.3"/>
  <circle cx="78" cy="374" r="1.5" fill="#a371f7" opacity="0.6"/>
  <circle cx="84" cy="374" r="1.5" fill="#a371f7" opacity="0.6"/>
  <circle cx="90" cy="374" r="1.5" fill="#a371f7" opacity="0.6"/>

  <text x="130" y="392"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16" font-weight="700" fill="#e6edf3">Next.js 14 Dashboard</text>
  <text x="130" y="411"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" fill="#8b949e">
    Live operator view — agent status · pipeline health · stream metrics · trade feed
  </text>

  <!-- Right badges -->
  <rect x="618" y="378" width="98" height="20" rx="4" fill="#1c0d3a" stroke="#8957e5" stroke-width="1"/>
  <text x="667" y="392"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#a371f7" text-anchor="middle">TypeScript</text>
  <rect x="726" y="378" width="84" height="20" rx="4" fill="#1c0d3a" stroke="#8957e5" stroke-width="1"/>
  <text x="768" y="392"
    font-family="ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="10" fill="#a371f7" text-anchor="middle">Vercel</text>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <rect x="0" y="464" width="860" height="3" rx="1" fill="#161b22"/>
  <text x="430" y="474"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9" fill="#30363d" text-anchor="middle">
    Determinism · Idempotency · Traceability · Replayability
  </text>
</svg>
