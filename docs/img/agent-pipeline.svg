<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#0969da"/>
    </marker>
    <filter id="s" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1f232814"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="540" fill="#ffffff" rx="10" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#57606a" letter-spacing="2">
    AGENT PIPELINE
  </text>

  <!-- ── Source ── -->
  <rect x="310" y="42" width="180" height="34" rx="17"
    fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <circle cx="338" cy="59" r="4" fill="#1a7f37"/>
  <text x="406" y="64" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" fill="#57606a">market_ticks</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="76" x2="400" y2="102"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── SignalGenerator ── -->
  <rect x="215" y="104" width="370" height="64" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="133" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="600" fill="#1f2328">SignalGenerator</text>
  <text x="400" y="153" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#57606a">Converts price ticks into trading signals</text>

  <!-- Arrow 2 + label -->
  <line x1="400" y1="168" x2="400" y2="198"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="412" y="187"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#0969da">signals</text>

  <!-- ── ReasoningAgent ── -->
  <rect x="215" y="200" width="370" height="64" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="229" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="600" fill="#1f2328">ReasoningAgent</text>
  <text x="400" y="249" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#57606a">Makes trade decisions using LLM reasoning</text>

  <!-- Arrow 3 + label -->
  <line x1="400" y1="264" x2="400" y2="294"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="412" y="283"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#0969da">decisions</text>

  <!-- ── GradeAgent ── -->
  <rect x="215" y="296" width="370" height="64" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="325" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="600" fill="#1f2328">GradeAgent</text>
  <text x="400" y="345" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" fill="#57606a">Scores every agent execution</text>

  <!-- ── Fork ── -->
  <line x1="400" y1="360" x2="400" y2="388"
    stroke="#0969da" stroke-width="1.5"/>
  <line x1="136" y1="388" x2="664" y2="388"
    stroke="#0969da" stroke-width="1.5"/>
  <line x1="136" y1="388" x2="136" y2="408"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="312" y1="388" x2="312" y2="408"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="488" y1="388" x2="488" y2="408"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="664" y1="388" x2="664" y2="408"
    stroke="#0969da" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Leaf agents (w=156, centers: 136, 312, 488, 664) ── -->

  <rect x="58" y="410" width="156" height="80" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="136" y="438" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="600" fill="#1f2328">ICUpdater</text>
  <text x="136" y="455" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#57606a">Reweights alpha factors</text>
  <text x="136" y="479" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#0969da">→ ic_weights</text>

  <rect x="234" y="410" width="156" height="80" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="312" y="438" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="600" fill="#1f2328">ReflectionAgent</text>
  <text x="312" y="455" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#57606a">Finds trade patterns</text>
  <text x="312" y="479" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#0969da">→ reflection_outputs</text>

  <rect x="410" y="410" width="156" height="80" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="488" y="438" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="600" fill="#1f2328">StrategyProposer</text>
  <text x="488" y="455" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#57606a">Creates proposals</text>
  <text x="488" y="479" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#0969da">→ proposals</text>

  <rect x="586" y="410" width="156" height="80" rx="8"
    fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" filter="url(#s)"/>
  <text x="664" y="438" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="600" fill="#1f2328">NotificationAgent</text>
  <text x="664" y="455" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#57606a">Routes alerts</text>
  <text x="664" y="479" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#0969da">→ notifications</text>

  <!-- Footer rule -->
  <line x1="40" y1="524" x2="760" y2="524" stroke="#d0d7de" stroke-width="1"/>
  <text x="400" y="535" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8c959f">Agents communicate via Redis Streams</text>
</svg>
