name: PERSISTENCE_MODE Guardrails

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-persistence-mode:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Run PERSISTENCE_MODE guardrails
      run: |
        python3 scripts/check_no_persistence_mode.py
    
    - name: Run persistence mode tests
      run: |
        python3 -m pytest tests/core/test_persistence_mode_guardrails.py -v
