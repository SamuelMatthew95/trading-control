name: Docker Build & Publish

# PRs: build the image (no push) to prove the Dockerfile stays green.
# main: build + push to GHCR tagged with branch, sha, and latest.
on:
  pull_request:
    branches: [main, develop]
    paths:
      - "api/**"
      - "backtest/**"
      - "cognitive/**"
      - "config/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [main]
    paths:
      - "api/**"
      - "backtest/**"
      - "cognitive/**"
      - "config/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Compute image name (lowercase owner)
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-independent layer cache shared across PRs and main.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        if: github.event_name == 'pull_request'
        run: |
          docker buildx build --load -t smoke-test .
          # Boot in memory mode (no Postgres needed) with a throwaway Redis.
          docker network create smoke
          docker run -d --name redis --network smoke redis:7-alpine
          docker run -d --name api --network smoke \
            -e USE_MEMORY_MODE=true -e REDIS_URL=redis://redis:6379/0 \
            -p 8000:8000 smoke-test
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "API never became healthy"; docker logs api; exit 1

      - name: Report failure
        if: failure()
        run: |
          {
            echo "## :x: Docker build failed"
            echo "Ref: \`${GITHUB_REF}\` — commit \`${GITHUB_SHA}\`"
            echo "See the failing step logs above."
          } >> "$GITHUB_STEP_SUMMARY"
