name: Config / Dependency PR Tagger

# Triggers whenever a PR to main touches requirements.txt or frontend package files.
# Auto-labels the PR and posts a comment showing exactly what changed.

on:
  pull_request:
    branches:
      - main
    paths:
      - "requirements.txt"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  tag-and-comment:
    name: Label PR and summarize changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "dependencies" --color "0075ca" --description "Dependency updates" 2>/dev/null || true
          gh label create "config-change" --color "f9d0c4" --description "Config or dependency file changed" 2>/dev/null || true

      - name: Label PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "dependencies,config-change"

      - name: Generate diff summary
        id: diff
        run: |
          python3 - << 'PYEOF'
          import subprocess, os

          pr_number = os.environ["PR_NUMBER"]
          files = ["requirements.txt", "frontend/package.json", "frontend/pnpm-lock.yaml"]

          sections = []

          for path in files:
              result = subprocess.run(
                  ["git", "diff", "origin/main...HEAD", "--", path],
                  capture_output=True, text=True
              )
              diff = result.stdout.strip()
              if not diff:
                  continue

              # Count added/removed lines (ignore diff headers)
              added   = sum(1 for l in diff.splitlines() if l.startswith("+") and not l.startswith("+++"))
              removed = sum(1 for l in diff.splitlines() if l.startswith("-") and not l.startswith("---"))

              # Truncate to 80 lines to keep the comment readable
              diff_lines = diff.splitlines()
              truncated = ""
              if len(diff_lines) > 80:
                  truncated = f"\n\n_...diff truncated ({len(diff_lines)} lines total). View the full diff in the Files tab._"
                  diff_lines = diff_lines[:80]

              section = f"### `{path}`\n\n"
              section += f"**+{added} added / -{removed} removed**\n\n"
              section += "```diff\n"
              section += "\n".join(diff_lines)
              section += "\n```"
              if truncated:
                  section += truncated
              sections.append(section)

          if not sections:
              body = "_No meaningful changes detected in tracked config files._"
          else:
              body = "\n\n".join(sections)

          # Write to a file so the next step can read it cleanly
          with open("/tmp/pr_comment.md", "w") as f:
              f.write(body)
          PYEOF
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Post diff comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/pr_comment.md', 'utf8');

            const body = [
              '## 📦 Config / Dependency Changes',
              '',
              'This PR modifies one or more dependency or config files. Changes:',
              '',
              diff,
              '',
              '---',
              '🤖 *Auto-posted by the [Config / Dependency PR Tagger](https://github.com/${{ github.repository }}/actions/workflows/config-version-bump.yml) workflow.*',
            ].join('\n');

            // Find an existing bot comment and update it, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Config / Dependency Changes')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
