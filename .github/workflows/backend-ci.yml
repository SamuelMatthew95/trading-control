name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "requirements.txt"
      - "pyproject.toml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "api/**"
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "requirements.txt"
      - "pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Single source of truth: requirements.txt includes runtime + test tooling.
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check . --fix
          ruff format --check .
          ruff check . --select=E9,F63,F7,F82

      - name: Run unit tests
        run: pytest tests/core tests/api -v --tb=long 2>&1 | tee /tmp/unit-test-output.txt; exit ${PIPESTATUS[0]}

      - name: Upload unit test output
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-output-${{ matrix.python-version }}
          path: /tmp/unit-test-output.txt

      - name: Run integration tests
        run: pytest tests/integration -v --tb=long
