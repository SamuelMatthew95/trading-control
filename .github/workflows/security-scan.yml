name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches CVEs published after the last push.
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Run pip-audit
        run: |
          pip install pip-audit
          # Audit the declared dependency set; report-only on schedule runs is
          # avoided on purpose — a finding should fail loudly everywhere.
          # Ignores (each must carry a reason):
          #   CVE-2025-69872 — diskcache 5.6.3 (transitive); no fixed release
          #   exists upstream yet. Remove the flag once a fix version ships.
          pip-audit -r requirements.txt --strict \
            --ignore-vuln CVE-2025-69872

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history — secrets hide in old commits
      # The gitleaks binary directly, not gitleaks-action: the action demands
      # a paid GITLEAKS_LICENSE for org-type accounts; the CLI is MIT-free.
      - name: Run gitleaks over full git history
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar xz gitleaks
          ./gitleaks git --redact --no-banner --exit-code 1 --config .gitleaks.toml .

  filesystem-scan:
    name: Filesystem CVE/misconfig scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  image-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: scan-target:ci
          cache-from: type=gha
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: scan-target:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: scan-target:ci
          format: spdx-json
          output: sbom.spdx.json
          exit-code: "0"
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

  report:
    name: Failure summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-scan, filesystem-scan, image-scan]
    if: failure()
    steps:
      - run: |
          {
            echo "## :rotating_light: Security scan failed"
            echo "One or more of pip-audit / gitleaks / Trivy found an issue."
            echo "Triage guidance: docs/platform/security.md"
          } >> "$GITHUB_STEP_SUMMARY"
