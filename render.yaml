services:
  - type: web
    name: trading-control-api
    env: python
    plan: starter
    healthCheckPath: /health
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "bash fix-production.sh && python -m alembic upgrade head"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-control-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trading-control-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://trading-control-frontend.onrender.com
      - key: RENDER
        value: "true"
  - type: redis
    name: trading-control-redis
    plan: starter

databases:
  - name: trading-control-db
    plan: starter
