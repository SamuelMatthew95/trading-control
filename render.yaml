services:
  # Type: web (HTTP server)
  - type: web
    name: trading-control
    env: python
    plan: starter
    # Downloads Tailscale binaries into .render/bin/ so the start script can
    # launch tailscaled for LM Studio over Tailscale.  The binaries are only
    # ~20 MB and are cached between deploys by Render's build cache.
    buildCommand: >-
      pip install -r requirements.txt &&
      mkdir -p .render/bin &&
      TSVER=1.78.1 &&
      curl -fsSL "https://pkgs.tailscale.com/stable/tailscale_${TSVER}_linux_amd64.tgz"
      | tar -xzf - --strip-components=1 -C .render/bin tailscale_${TSVER}_linux_amd64/tailscale
        tailscale_${TSVER}_linux_amd64/tailscaled
    # .render/start.sh: starts tailscaled, runs tailscale up, then launches gunicorn.
    # Set TAILSCALE_AUTHKEY, LM_STUDIO_HOST, LM_STUDIO_PORT, LM_STUDIO_PROXY_URL
    # in Render env vars.  If TAILSCALE_AUTHKEY is absent the script skips Tailscale.
    startCommand: bash .render/start.sh
    healthCheckPath: /health
    autoDeploy: true
    dependsOn:
      - trading-control-db
      - trading-control-redis
    restartPolicy:
      type: always
    
    # Environment variables
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: REDIS_URL
        fromService:
          name: trading-control-redis
          type: ps
      - key: DATABASE_URL
        fromService:
          name: trading-control-db
          type: ps

  # NOTE: Price poller is now integrated into the web service as a background task.
  # No separate worker needed — it starts automatically with the app.

  # PostgreSQL
  - type: ps
    name: trading-control-db
    plan: starter
    databaseName: trading_control
    user: trading

  # Redis
  - type: redis
    name: trading-control-redis
    plan: starter

# Optional: simple health check
healthChecks:
  - type: livenessProbe
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
