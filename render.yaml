services:
  - type: web
    name: trading-control-api
    env: python
    plan: starter
    buildCommand: "bash render-build.sh"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-control-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trading-control-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://trading-control-frontend.onrender.com
      - key: RENDER
        value: "true"

databases:
  - name: trading-control-db
    plan: starter

services:
  - type: redis
    name: trading-control-redis
    plan: starter
