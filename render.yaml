services:
  # Type: web (HTTP server)
  - type: web
    name: trading-control
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    dependsOn:
      - trading-control-db
      - trading-control-redis
    restartPolicy:
      type: always
    
    # Environment variables
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: REDIS_URL
        fromService:
          name: trading-control-redis
          type: ps
      - key: DATABASE_URL
        fromService:
          name: trading-control-db
          type: ps

  # NOTE: Price poller is now integrated into the web service as a background task.
  # No separate worker needed — it starts automatically with the app.

  # PostgreSQL
  - type: ps
    name: trading-control-db
    plan: starter
    databaseName: trading_control
    user: trading

  # Redis
  - type: redis
    name: trading-control-redis
    plan: starter

# Optional: simple health check
healthChecks:
  - type: livenessProbe
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
