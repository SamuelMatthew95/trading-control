services:
  # Type: web (HTTP server)
  - type: web
    name: trading-control
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    dependsOn:
      - trading-control-db
      - trading-control-redis
    restartPolicy:
      type: always
    
    # Environment variables
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: REDIS_URL
        fromService:
          name: trading-control-redis
          type: ps
      - key: DATABASE_URL
        fromService:
          name: trading-control-db
          type: ps

  # Type: worker (background process)
  - type: worker
    name: trading-price-poller
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m api.workers.price_poller
    autoDeploy: true
    dependsOn:
      - trading-control-db
      - trading-control-redis
    restartPolicy:
      type: always
    
    # Environment variables
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: REDIS_URL
        fromService:
          name: trading-control-redis
          type: redis
      - key: DATABASE_URL
        fromService:
          name: trading-control-db
          type: pserv
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: MARKET_DATA_PROVIDER
        value: alpaca

  # PostgreSQL
  - type: ps
    name: trading-control-db
    plan: starter
    databaseName: trading_control
    user: trading

  # Redis
  - type: redis
    name: trading-control-redis
    plan: starter

# Optional: simple health check
healthChecks:
  - type: livenessProbe
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
