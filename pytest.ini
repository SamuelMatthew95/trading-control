[pytest]
markers =
    vector: tests requiring pgvector extension or vector embeddings
    integration: tests requiring database infrastructure
    unit: pure unit tests with no external dependencies
    slow: tests that take longer to run

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

addopts =
    -v
    --tb=short
    --strict-markers

testpaths =
    tests

python_files =
    test_*.py
    *_test.py

python_classes =
    Test*

python_functions =
    test_*

asyncio_mode = auto
