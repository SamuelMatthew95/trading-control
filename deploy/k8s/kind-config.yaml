# Kind cluster for trading-control.
#   kind create cluster --name trading --config deploy/k8s/kind-config.yaml
# Ports 80/443 are mapped so the ingress-nginx controller is reachable from
# the host at http://localhost.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: trading
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
