# Apply the whole stack:
#   kubectl apply -k deploy/k8s/
# (secret.example.yaml is intentionally NOT included — create the real
#  Secret out-of-band; the api Deployment marks it optional.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: trading-control
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - api.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: trading-control
