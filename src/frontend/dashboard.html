<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Control Platform Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card h3 {
            margin-top: 0;
            color: #fff;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.running {
            background: #4CAF50;
        }
        .status.active {
            background: #2196F3;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .metric {
            text-align: center;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }
        .metric-label {
            font-size: 12px;
            opacity: 0.8;
        }
        .agent-list {
            margin-top: 15px;
        }
        .agent {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .refresh-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 20px auto;
            display: block;
        }
        .refresh-btn:hover {
            background: #45a049;
        }
        .tools {
            margin-top: 15px;
        }
        .tool {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .execute-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        .execute-btn:hover {
            background: #1976D2;
        }
        .result {
            background: rgba(76, 175, 80, 0.2);
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Trading Control Platform</h1>
            <p>OpenClaw-Powered Agent Management System</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>🚀 Platform Status</h3>
                <div id="platform-status">
                    <p>Loading...</p>
                </div>
            </div>

            <div class="card">
                <h3>🤖 Agents</h3>
                <div id="agents">
                    <p>Loading...</p>
                </div>
            </div>

            <div class="card">
                <h3>🔧 Tools</h3>
                <div id="tools">
                    <p>Loading...</p>
                </div>
            </div>

            <div class="card">
                <h3>📊 Orchestrator</h3>
                <div id="orchestrator">
                    <p>Loading...</p>
                </div>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
    </div>

    <script>
        async function loadData() {
            try {
                // Load platform status
                const platformResponse = await fetch('/api/v1/platform/status');
                const platformData = await platformResponse.json();
                
                document.getElementById('platform-status').innerHTML = `
                    <div class="metrics">
                        <div class="metric">
                            <span class="metric-value">${platformData.registered_agents}</span>
                            <span class="metric-label">Agents</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">${platformData.active_tasks}</span>
                            <span class="metric-label">Active Tasks</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">${platformData.orchestrator.successful_cycles}</span>
                            <span class="metric-label">Success Cycles</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">${(platformData.orchestrator.success_rate * 100).toFixed(1)}%</span>
                            <span class="metric-label">Success Rate</span>
                        </div>
                    </div>
                    <p><span class="status running">Running</span> ${platformData.environment}</p>
                `;

                // Load agents
                const agentsResponse = await fetch('/api/v1/agents');
                const agentsData = await agentsResponse.json();
                
                document.getElementById('agents').innerHTML = `
                    <div class="agent-list">
                        ${agentsData.map(agent => `
                            <div class="agent">
                                <strong>${agent.name}</strong>
                                <span class="status active">${agent.status}</span>
                                <p>Tasks: ${agent.tasks_completed} completed, ${agent.tasks_failed} failed</p>
                                <p>Load: ${agent.current_load}/${agent.max_concurrent_tasks}</p>
                            </div>
                        `).join('')}
                    </div>
                `;

                // Load tools
                const toolsResponse = await fetch('/api/v1/tools');
                const toolsData = await toolsResponse.json();
                
                document.getElementById('tools').innerHTML = `
                    <div class="tools">
                        ${toolsData.map(tool => `
                            <div class="tool">
                                <strong>${tool.name}</strong>
                                <p>${tool.description}</p>
                                <button class="execute-btn" onclick="executeTool('${tool.tool_id}')">Execute</button>
                                <div id="result-${tool.tool_id}"></div>
                            </div>
                        `).join('')}
                    </div>
                `;

                // Load orchestrator info
                const orchestratorData = platformData.orchestrator;
                document.getElementById('orchestrator').innerHTML = `
                    <div class="metrics">
                        <div class="metric">
                            <span class="metric-value">${orchestratorData.active_cycles}</span>
                            <span class="metric-label">Active Cycles</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">${orchestratorData.total_cycles}</span>
                            <span class="metric-label">Total Cycles</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">${orchestratorData.symbols_monitored.length}</span>
                            <span class="metric-label">Symbols</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">${orchestratorData.registered_agents}</span>
                            <span class="metric-label">Agents</span>
                        </div>
                    </div>
                    <p><strong>Current Cycle:</strong> ${orchestratorData.current_cycle_id}</p>
                    <p><strong>Monitoring:</strong> ${orchestratorData.symbols_monitored.join(', ')}</p>
                `;

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        async function executeTool(toolId) {
            const resultDiv = document.getElementById(`result-${toolId}`);
            resultDiv.innerHTML = '<p>Executing...</p>';
            
            try {
                const params = toolId === 'get_stock_quote' ? 
                    { symbol: 'AAPL' } : 
                    { data: { price: 100, volume: 1000 }, source: 'test' };
                
                const response = await fetch(`/api/v1/tools/${toolId}/execute`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tool_id: toolId,
                        parameters: params
                    })
                });
                
                const result = await response.json();
                resultDiv.innerHTML = `<div class="result">${JSON.stringify(result, null, 2)}</div>`;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result">Error: ${error.message}</div>`;
            }
        }

        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 seconds
        setInterval(loadData, 5000);
    </script>
</body>
</html>
