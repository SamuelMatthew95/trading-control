<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Parallel Agent Dashboard</title>
    <style>
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #00ff88;
            overflow-x: hidden;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            margin: 0;
            text-shadow: 0 0 10px #00ff88;
        }
        .system-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
            animation: scan 2s infinite;
        }
        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            display: block;
        }
        .metric-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            height: 500px;
            overflow-y: auto;
        }
        .panel h3 {
            margin-top: 0;
            color: #00ff88;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 10px;
        }
        .agent-card {
            background: rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00ff88;
            position: relative;
        }
        .agent-card.thinking {
            border-left-color: #ffff00;
            animation: pulse 1s infinite;
        }
        .agent-card.processing {
            border-left-color: #ff00ff;
            animation: pulse 0.5s infinite;
        }
        .agent-card.collaborating {
            border-left-color: #00ffff;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .agent-name {
            color: #00ffff;
            font-weight: bold;
            font-size: 14px;
        }
        .agent-specialty {
            color: #888;
            font-size: 11px;
            margin-bottom: 5px;
        }
        .thinking-dots {
            display: inline-block;
            margin-left: 10px;
        }
        .thinking-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffff00;
            margin: 0 2px;
            animation: thinking 1.4s infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes thinking {
            0%, 60%, 100% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.3); opacity: 0.7; }
        }
        .parallel-task {
            background: rgba(255, 0, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #ff00ff;
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .task-title {
            color: #ff00ff;
            font-weight: bold;
        }
        .task-time {
            color: #888;
            font-size: 11px;
        }
        .task-agents {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .task-agent {
            background: rgba(255, 0, 255, 0.2);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 10px;
            color: #ff00ff;
        }
        .collaboration-log {
            background: rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00ffff;
        }
        .collaboration-header {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .collaboration-message {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        .btn {
            background: linear-gradient(45deg, #00ff88, #00ffff);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            margin: 0 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .load-indicator {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .load-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #ffff00, #ff00ff);
            transition: width 0.3s ease;
        }
        .performance-chart {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            margin-top: 20px;
        }
        .confidence-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00);
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ADVANCED PARALLEL AGENT SYSTEM</h1>
            <p>High-Performance Non-Deterministic Team Collaboration</p>
        </div>

        <div class="system-metrics">
            <div class="metric-card">
                <span class="metric-value" id="total-agents">8</span>
                <span class="metric-label">Total Agents</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="active-agents">0</span>
                <span class="metric-label">Active Agents</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="system-load">0%</span>
                <span class="metric-label">System Load</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="throughput">0</span>
                <span class="metric-label">Throughput</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="parallel-tasks">0</span>
                <span class="metric-label">Parallel Tasks</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="avg-confidence">0%</span>
                <span class="metric-label">Avg Confidence</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h3>🤖 Agent Status</h3>
                <div id="agent-grid">
                    <!-- Agents will be populated here -->
                </div>
            </div>

            <div class="panel">
                <h3>⚡ Parallel Execution</h3>
                <div id="parallel-tasks-container">
                    <!-- Parallel tasks will be shown here -->
                </div>
            </div>

            <div class="panel">
                <h3>💬 Team Collaboration</h3>
                <div id="collaboration-log">
                    <!-- Collaboration messages will appear here -->
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="startParallelAnalysis()" id="parallel-btn">⚡ Start Parallel Analysis</button>
            <button class="btn" onclick="startHighLoad()" id="load-btn">🔥 High Load Test</button>
            <button class="btn" onclick="toggleContinuous()" id="continuous-btn">🔄 Continuous: OFF</button>
        </div>

        <div class="performance-chart">
            <h3>📊 System Performance</h3>
            <div class="load-indicator">
                <div class="load-bar" id="load-bar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        let continuousMode = false;
        let continuousInterval = null;
        let currentAnalysis = null;

        async function updateSystemStatus() {
            try {
                const response = await fetch('/api/v1/advanced-status');
                const status = await response.json();
                
                // Update metrics
                document.getElementById('total-agents').textContent = status.total_agents;
                document.getElementById('active-agents').textContent = status.active_agents;
                document.getElementById('system-load').textContent = Math.round(status.system_load * 100) + '%';
                document.getElementById('throughput').textContent = status.throughput;
                
                // Update load bar
                document.getElementById('load-bar').style.width = (status.system_load * 100) + '%';
                
                // Update agent grid
                const agentGrid = document.getElementById('agent-grid');
                agentGrid.innerHTML = '';
                
                let totalConfidence = 0;
                let agentCount = 0;
                
                for (const [agentId, agent] of Object.entries(status.agent_states)) {
                    totalConfidence += agent.confidence;
                    agentCount++;
                    
                    const agentCard = document.createElement('div');
                    agentCard.className = `agent-card ${agent.state}`;
                    
                    let stateIndicator = '';
                    if (agent.state === 'thinking') {
                        stateIndicator = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
                    } else if (agent.state === 'processing') {
                        stateIndicator = '<div class="thinking-dots"><span style="background: #ff00ff"></span><span style="background: #ff00ff"></span><span style="background: #ff00ff"></span></div>';
                    } else if (agent.state === 'collaborating') {
                        stateIndicator = '<div class="thinking-dots"><span style="background: #00ffff"></span><span style="background: #00ffff"></span><span style="background: #00ffff"></span></div>';
                    }
                    
                    agentCard.innerHTML = `
                        <div class="agent-name">${agent.name} ${stateIndicator}</div>
                        <div class="agent-specialty">${agent.specialty}</div>
                        <div>📊 State: ${agent.state.toUpperCase()}</div>
                        <div>⚡ Speed: ${agent.processing_speed.toFixed(2)}x</div>
                        <div>🎯 Confidence: ${Math.round(agent.confidence * 100)}%</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${agent.confidence * 100}%"></div>
                        </div>
                    `;
                    
                    agentGrid.appendChild(agentCard);
                }
                
                // Update average confidence
                const avgConfidence = agentCount > 0 ? totalConfidence / agentCount : 0;
                document.getElementById('avg-confidence').textContent = Math.round(avgConfidence * 100) + '%';
                
            } catch (error) {
                console.error('Error updating system status:', error);
            }
        }

        async function startParallelAnalysis() {
            const btn = document.getElementById('parallel-btn');
            btn.disabled = true;
            btn.textContent = '⚡ Executing...';
            
            try {
                const response = await fetch('/api/v1/parallel-analysis', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: 'AAPL' })
                });
                const result = await response.json();
                
                // Display parallel execution
                displayParallelExecution(result);
                
            } catch (error) {
                console.error('Error in parallel analysis:', error);
            }
            
            btn.disabled = false;
            btn.textContent = '⚡ Start Parallel Analysis';
        }

        function displayParallelExecution(result) {
            const container = document.getElementById('parallel-tasks-container');
            
            // Add new parallel task display
            const taskDiv = document.createElement('div');
            taskDiv.className = 'parallel-task';
            
            const agents = result.results.map(r => r.lead_agent || r.team_type).join(', ');
            
            taskDiv.innerHTML = `
                <div class="task-header">
                    <span class="task-title">🚀 ${result.symbol} Analysis</span>
                    <span class="task-time">${result.execution_time.toFixed(2)}s</span>
                </div>
                <div class="task-agents">
                    ${result.results.map((r, i) => `<span class="task-agent">Team ${i+1}: ${r.lead_agent || r.team_type}</span>`).join('')}
                </div>
                <div>⚡ ${result.parallel_tasks} parallel tasks | ✅ ${result.successful_tasks} successful</div>
                <div>📊 ${result.results.reduce((sum, r) => sum + (r.data_points_analyzed || 0), 0)} data points analyzed</div>
            `;
            
            container.insertBefore(taskDiv, container.firstChild);
            
            // Keep only last 5 tasks
            while (container.children.length > 5) {
                container.removeChild(container.lastChild);
            }
            
            // Add collaboration log entries
            addCollaborationEntry(`🚀 Started parallel analysis of ${result.symbol} with ${result.parallel_tasks} teams`);
            result.results.forEach((r, i) => {
                if (r.insights) {
                    addCollaborationEntry(`💡 Team ${i+1}: ${r.insights.slice(0, 2).join(' | ')}`);
                }
            });
            addCollaborationEntry(`✅ Analysis completed in ${result.execution_time.toFixed(2)}s`);
        }

        async function startHighLoad() {
            const btn = document.getElementById('load-btn');
            btn.disabled = true;
            btn.textContent = '🔥 Stress Testing...';
            
            addCollaborationEntry('🔥 Starting high-load stress test...');
            
            // Start multiple parallel analyses
            const promises = [];
            for (let i = 0; i < 5; i++) {
                promises.push(
                    fetch('/api/v1/parallel-analysis', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ symbol: ['AAPL', 'GOOGL', 'MSFT', 'TSLA', 'NVDA'][i] })
                    })
                );
            }
            
            try {
                const results = await Promise.all(promises);
                addCollaborationEntry('✅ High-load test completed successfully!');
            } catch (error) {
                addCollaborationEntry('❌ High-load test failed');
            }
            
            btn.disabled = false;
            btn.textContent = '🔥 High Load Test';
        }

        function toggleContinuous() {
            continuousMode = !continuousMode;
            const btn = document.getElementById('continuous-btn');
            
            if (continuousMode) {
                btn.textContent = '🔄 Continuous: ON';
                btn.style.background = 'linear-gradient(45deg, #ff00ff, #00ffff)';
                startContinuousMode();
                addCollaborationEntry('🔄 Continuous mode ENABLED');
            } else {
                btn.textContent = '🔄 Continuous: OFF';
                btn.style.background = 'linear-gradient(45deg, #00ff88, #00ffff)';
                stopContinuousMode();
                addCollaborationEntry('🔄 Continuous mode DISABLED');
            }
        }

        function startContinuousMode() {
            continuousInterval = setInterval(() => {
                startParallelAnalysis();
            }, 3000);
        }

        function stopContinuousMode() {
            if (continuousInterval) {
                clearInterval(continuousInterval);
                continuousInterval = null;
            }
        }

        function addCollaborationEntry(message) {
            const log = document.getElementById('collaboration-log');
            const entry = document.createElement('div');
            entry.className = 'collaboration-log';
            entry.innerHTML = `
                <div class="collaboration-header">${new Date().toLocaleTimeString()}</div>
                <div class="collaboration-message">${message}</div>
            `;
            
            log.insertBefore(entry, log.firstChild);
            
            // Keep only last 10 entries
            while (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }

        // Initialize and start real-time updates
        async function init() {
            await updateSystemStatus();
            
            // Update every 1 second for real-time feel
            setInterval(updateSystemStatus, 1000);
            
            addCollaborationEntry('🚀 Advanced Parallel Agent System Initialized');
            addCollaborationEntry('🤖 8 specialized agents ready for parallel execution');
        }

        // Start the system
        init();
    </script>
</body>
</html>
