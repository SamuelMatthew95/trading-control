<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Trading Dashboard</title>
    <style>
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1b69 100%);
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #ffd700;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 32px;
            margin: 0;
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700;
        }
        .header p {
            font-size: 18px;
            color: #ffd700;
            opacity: 0.8;
        }
        .decision-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        .action-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .action-badge {
            font-size: 48px;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
            min-width: 200px;
        }
        .action-badge.buy {
            background: linear-gradient(135deg, #00ff00, #00aa00);
            color: #000;
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.4);
        }
        .action-badge.sell {
            background: linear-gradient(135deg, #ff0000, #aa0000);
            color: #fff;
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
        }
        .action-badge.hold {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            color: #000;
            box-shadow: 0 5px 20px rgba(255, 170, 0, 0.4);
        }
        .confidence-meter {
            text-align: center;
        }
        .confidence-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }
        .confidence-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ffaa00, #00ff00);
            transition: width 1s ease;
        }
        .key-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .metric {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .metric-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        .report-display {
            background: #000;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
            color: #00ff00;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        .btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            margin: 0 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
        }
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .symbol-selector {
            text-align: center;
            margin: 20px 0;
        }
        .symbol-selector input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffd700;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-family: inherit;
            margin: 0 10px;
        }
        .symbol-selector input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #ffd700;
            margin: 20px 0;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        .quick-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .quick-btn:hover {
            background: rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 BOSS TRADING DASHBOARD</h1>
            <p>Final Trading Decisions & Actionable Intelligence</p>
        </div>

        <div class="symbol-selector">
            <input type="text" id="symbol-input" placeholder="Enter stock symbol" value="AAPL">
            <button class="btn" onclick="generateDecision()">🎯 Generate Decision</button>
        </div>

        <div class="quick-actions">
            <button class="quick-btn" onclick="quickDecision('AAPL')">🍎 AAPL</button>
            <button class="quick-btn" onclick="quickDecision('GOOGL')">🔍 GOOGL</button>
            <button class="quick-btn" onclick="quickDecision('MSFT')">💻 MSFT</button>
            <button class="quick-btn" onclick="quickDecision('TSLA')">🚗 TSLA</button>
            <button class="quick-btn" onclick="quickDecision('NVDA')">🎮 NVDA</button>
            <button class="quick-btn" onclick="quickDecision('AMZN')">📦 AMZN</button>
        </div>

        <div id="loading-section" class="loading" style="display: none;">
            🤖 Agents are analyzing the market. This may take a few seconds
        </div>

        <div id="decision-section" style="display: none;">
            <div class="decision-card">
                <div class="action-display">
                    <div>
                        <div id="action-badge" class="action-badge">--</div>
                        <div style="text-align: center; margin-top: 10px;">
                            <strong id="symbol-display">SYMBOL</strong>
                        </div>
                    </div>
                    <div class="confidence-meter">
                        <div class="confidence-label">CONFIDENCE</div>
                        <div class="confidence-value" id="confidence-value">0%</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidence-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="key-metrics">
                    <div class="metric">
                        <div class="metric-label">TARGET PRICE</div>
                        <div class="metric-value" id="target-price">$--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">STOP LOSS</div>
                        <div class="metric-value" id="stop-loss">$--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">POSITION SIZE</div>
                        <div class="metric-value" id="position-size">--%</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">TIME HORIZON</div>
                        <div class="metric-value" id="time-horizon">--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">DATA POINTS</div>
                        <div class="metric-value" id="data-points">--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">EXECUTION TIME</div>
                        <div class="metric-value" id="execution-time">--s</div>
                    </div>
                </div>
            </div>

            <div class="report-display" id="report-display">
                Waiting for analysis report...
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="executeTrade()" id="execute-btn" style="display: none;">💰 EXECUTE TRADE</button>
            <button class="btn" onclick="printReport()">🖨️ PRINT REPORT</button>
            <button class="btn" onclick="exportReport()">📊 EXPORT DATA</button>
        </div>
    </div>

    <script>
        let currentDecision = null;

        async function generateDecision() {
            const symbol = document.getElementById('symbol-input').value.toUpperCase();
            if (!symbol) {
                alert('Please enter a stock symbol');
                return;
            }
            
            await performAnalysis(symbol);
        }

        async function quickDecision(symbol) {
            document.getElementById('symbol-input').value = symbol;
            await performAnalysis(symbol);
        }

        async function performAnalysis(symbol) {
            // Show loading
            document.getElementById('loading-section').style.display = 'block';
            document.getElementById('decision-section').style.display = 'none';
            document.getElementById('execute-btn').style.display = 'none';
            
            try {
                const response = await fetch('/api/v1/final-decision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: symbol })
                });
                
                const result = await response.json();
                currentDecision = result;
                
                // Hide loading, show results
                document.getElementById('loading-section').style.display = 'none';
                document.getElementById('decision-section').style.display = 'block';
                
                // Update action badge
                const actionBadge = document.getElementById('action-badge');
                actionBadge.textContent = result.analysis_summary.action;
                actionBadge.className = `action-badge ${result.analysis_summary.action.toLowerCase()}`;
                
                // Update symbol
                document.getElementById('symbol-display').textContent = result.symbol;
                
                // Update confidence
                const confidence = result.analysis_summary.confidence;
                document.getElementById('confidence-value').textContent = confidence.toFixed(1) + '%';
                document.getElementById('confidence-fill').style.width = confidence + '%';
                
                // Update metrics
                document.getElementById('target-price').textContent = '$' + result.analysis_summary.target_price.toFixed(2);
                document.getElementById('stop-loss').textContent = '$' + result.analysis_summary.stop_loss.toFixed(2);
                document.getElementById('position-size').textContent = result.analysis_summary.position_size.toFixed(1) + '%';
                document.getElementById('time-horizon').textContent = result.analysis_summary.time_horizon.toUpperCase();
                document.getElementById('data-points').textContent = result.analysis_summary.data_points.toLocaleString();
                document.getElementById('execution-time').textContent = result.analysis_summary.execution_time.toFixed(2) + 's';
                
                // Display report
                document.getElementById('report-display').textContent = result.formatted_report;
                
                // Show execute button if it's a BUY or SELL
                if (result.analysis_summary.action !== 'HOLD') {
                    document.getElementById('execute-btn').style.display = 'inline-block';
                }
                
            } catch (error) {
                console.error('Error generating decision:', error);
                document.getElementById('loading-section').style.display = 'none';
                alert('Error generating trading decision. Please try again.');
            }
        }

        function executeTrade() {
            if (!currentDecision) return;
            
            const action = currentDecision.analysis_summary.action;
            const symbol = currentDecision.symbol;
            const confidence = currentDecision.analysis_summary.confidence;
            
            const message = `🎯 EXECUTE TRADE:\n\n` +
                          `Action: ${action} ${symbol}\n` +
                          `Confidence: ${confidence.toFixed(1)}%\n` +
                          `Target: $${currentDecision.analysis_summary.target_price.toFixed(2)}\n` +
                          `Stop Loss: $${currentDecision.analysis_summary.stop_loss.toFixed(2)}\n` +
                          `Position: ${currentDecision.analysis_summary.position_size.toFixed(1)}%\n\n` +
                          `Are you sure you want to execute this trade?`;
            
            if (confirm(message)) {
                alert(`✅ Trade order sent to broker!\n\n${action} ${symbol} at market price.\nStop loss and target orders placed automatically.`);
            }
        }

        function printReport() {
            if (!currentDecision) {
                alert('Please generate a decision first');
                return;
            }
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Trading Decision Report - ${currentDecision.symbol}</title>
                    <style>
                        body { font-family: 'Courier New', monospace; margin: 20px; }
                        pre { background: #f5f5f5; padding: 20px; border-radius: 5px; }
                    </style>
                </head>
                <body>
                    <h1>Trading Decision Report - ${currentDecision.symbol}</h1>
                    <pre>${currentDecision.formatted_report}</pre>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        function exportReport() {
            if (!currentDecision) {
                alert('Please generate a decision first');
                return;
            }
            
            const dataStr = JSON.stringify(currentDecision, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `trading_decision_${currentDecision.symbol}_${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // Auto-generate AAPL decision on page load
        window.addEventListener('load', () => {
            setTimeout(() => quickDecision('AAPL'), 1000);
        });
    </script>
</body>
</html>
